spring.application.name=SwapTN_new
server.port=8081

# ===============================
# DATABASE CONNECTION - NEON POSTGRESQL
# ===============================

# JDBC URL compatible Neon avec pooler
spring.datasource.url=jdbc:postgresql://ep-soft-mode-anv4cqhn-pooler.c-6.us-east-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require

# Récupérer des variables d'environnement (.env ou système)
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASSWORD:}

# ===============================
# HIKARICP CONNECTION POOL
# ===============================

# Configuration optimisée pour Neon
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=15000

# ===============================
# JPA / HIBERNATE
# ===============================

# IMPORTANT: validate (pas update!) pour éviter les modifications indésirées
# Les tables existent déjà dans Neon
spring.jpa.hibernate.ddl-auto=validate

# PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Affichage SQL (désactivé pour performance)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Recommandé pour éviter les erreurs N+1
spring.jpa.open-in-view=false

# Performance optimisée
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===============================
# JWT
# ===============================

jwt.secret=change-this-to-a-very-long-secret-key-for-hs256-signing-1234567890
jwt.expiration=86400000



